<!DOCTYPE html>

<html class="light" lang="en-AU"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#788599",
                    "on-error": "#ffffff",
                    "surface-tint": "#535f72",
                    "surface-variant": "#e4e2e3",
                    "on-background": "#1b1b1d",
                    "surface-container-high": "#eae7e9",
                    "error": "#ba1a1a",
                    "primary-container": "#0f1c2c",
                    "tertiary": "#000000",
                    "surface-bright": "#fbf9fa",
                    "on-tertiary-fixed": "#001a41",
                    "outline-variant": "#c5c6cd",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#0f1c2c",
                    "tertiary-container": "#001a41",
                    "primary": "#000000",
                    "on-tertiary": "#ffffff",
                    "on-surface": "#1b1b1d",
                    "on-tertiary-fixed-variant": "#004494",
                    "primary-fixed-dim": "#bac7dd",
                    "on-error-container": "#93000a",
                    "secondary-fixed": "#a0f1e7",
                    "on-secondary-container": "#0c6f66",
                    "secondary-fixed-dim": "#84d5cb",
                    "surface-dim": "#dbd9db",
                    "on-tertiary-container": "#3280f9",
                    "surface-container-low": "#f5f3f4",
                    "secondary-container": "#9deee4",
                    "secondary": "#016a62",
                    "on-secondary-fixed-variant": "#00504a",
                    "on-surface-variant": "#44474c",
                    "inverse-on-surface": "#f2f0f1",
                    "background": "#fbf9fa",
                    "surface": "#fbf9fa",
                    "on-primary": "#ffffff",
                    "outline": "#75777d",
                    "inverse-surface": "#303032",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#adc6ff",
                    "inverse-primary": "#bac7dd",
                    "surface-container-highest": "#e4e2e3",
                    "tertiary-fixed": "#d8e2ff",
                    "surface-container": "#f0edef",
                    "primary-fixed": "#d6e3fa",
                    "on-primary-fixed-variant": "#3b4859",
                    "on-secondary-fixed": "#00201d"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "touch-target-min": "48px",
                    "xl": "32px",
                    "lg": "24px",
                    "xs": "4px",
                    "margin-desktop": "32px",
                    "sm": "8px",
                    "gutter": "16px",
                    "margin-mobile": "16px",
                    "md": "16px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "button-text": ["Inter"],
                    "display-lg": ["Inter"],
                    "body-base": ["Inter"],
                    "title-sm": ["Inter"],
                    "body-sm": ["Inter"],
                    "label-caps": ["Inter"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "button-text": ["15px", {"lineHeight": "20px", "fontWeight": "600"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-base": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-base text-on-background selection:bg-secondary-container">
<!-- Sticky Header -->
<header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md h-16 flex items-center justify-between px-margin-mobile shadow-sm">
<button aria-label="Go back" class="w-touch-target-min h-touch-target-min flex items-center justify-start text-on-surface">
<span class="material-symbols-outlined text-headline-md">arrow_back</span>
</button>
<h1 class="font-headline-md text-title-sm text-primary-container">Add Buyer</h1>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-end font-button-text text-secondary">
            Save
        </button>
</header>
<main class="pb-32 px-margin-mobile flex flex-col gap-md pt-md">
<!-- Identity Section -->
<section class="bg-white rounded-xl shadow-sm p-md flex flex-col gap-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">person</span>
<h2 class="font-title-sm text-on-surface">Identity</h2>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant">Full Name</label>
<input class="w-full h-12 px-md border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="e.g. Lachlan Smith" type="text"/>
</div>
<div class="grid grid-cols-2 gap-sm">
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant">Phone</label>
<input class="w-full h-12 px-md border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="0400 000 000" type="tel"/>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant">Email</label>
<input class="w-full h-12 px-md border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all" placeholder="l.smith@domain.au" type="email"/>
</div>
</div>
<div class="flex flex-col gap-sm pt-xs">
<label class="font-label-caps text-on-surface-variant">Buyer Temperature</label>
<div class="flex gap-sm">
<button class="flex-1 py-2 rounded-full font-button-text border border-error bg-error-container/20 text-error flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
                        Hot
                    </button>
<button class="flex-1 py-2 rounded-full font-button-text border border-secondary bg-secondary-container/20 text-on-secondary-container flex items-center justify-center gap-1">
                        Warm
                    </button>
<button class="flex-1 py-2 rounded-full font-button-text border border-outline-variant text-on-surface-variant flex items-center justify-center gap-1">
                        Cold
                    </button>
</div>
</div>
</section>
<!-- Status & Timeline -->
<section class="bg-white rounded-xl shadow-sm p-md flex flex-col gap-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary">analytics</span>
<h2 class="font-title-sm text-on-surface">Status</h2>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant">Lead Status</label>
<div class="flex flex-wrap gap-xs">
<span class="px-3 py-1.5 rounded-full bg-secondary text-white font-label-caps">Active Search</span>
<span class="px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-caps">New Lead</span>
<span class="px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-caps">Under Offer</span>
<span class="px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-caps">Archived</span>
</div>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant">Buying Timeline</label>
<div class="flex flex-wrap gap-xs">
<span class="px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-caps">ASAP</span>
<span class="px-3 py-1.5 rounded-full bg-secondary-container text-on-secondary-container font-label-caps">1-3 Months</span>
<span class="px-3 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-caps">6+ Months</span>
</div>
</div>
</section>
<!-- Looking For Section -->
<section class="bg-white rounded-xl shadow-sm p-md flex flex-col gap-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary">search</span>
<h2 class="font-title-sm text-on-surface">Requirement</h2>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant">Target Suburbs</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-3 text-outline text-[20px]">location_on</span>
<input class="w-full h-12 pl-10 pr-md border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary outline-none" placeholder="Search suburbs..." type="text"/>
</div>
<div class="flex flex-wrap gap-xs mt-1">
<span class="flex items-center gap-1 px-3 py-1 rounded-md bg-primary-container text-white text-body-sm">
                        Paddington <span class="material-symbols-outlined text-sm">close</span>
</span>
<span class="flex items-center gap-1 px-3 py-1 rounded-md bg-primary-container text-white text-body-sm">
                        Surry Hills <span class="material-symbols-outlined text-sm">close</span>
</span>
</div>
</div>
<div class="grid grid-cols-2 gap-sm">
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant">Min Budget</label>
<input class="w-full h-12 px-md border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary outline-none" placeholder="$1.2M" type="text"/>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant">Max Budget</label>
<input class="w-full h-12 px-md border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary outline-none" placeholder="$1.8M" type="text"/>
</div>
</div>
<div class="flex flex-col gap-sm">
<label class="font-label-caps text-on-surface-variant">Min Bedrooms</label>
<div class="flex border border-outline-variant rounded-lg overflow-hidden h-12">
<button class="flex-1 flex items-center justify-center bg-surface-container-low active:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="flex-[1.5] flex items-center justify-center font-headline-md text-title-sm border-x border-outline-variant bg-white">
                        3
                    </div>
<button class="flex-1 flex items-center justify-center bg-surface-container-low active:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</section>
<!-- Notes Section -->
<section class="bg-white rounded-xl shadow-sm p-md flex flex-col gap-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary">description</span>
<h2 class="font-title-sm text-on-surface">Agent Notes</h2>
</div>
<textarea class="w-full min-h-[120px] p-md border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary outline-none text-body-sm resize-none" placeholder="Add private details about the buyer's preferences, family, or situation..."></textarea>
</section>
<!-- Show More Toggle -->
<button class="w-full py-4 flex items-center justify-between px-2 text-on-surface-variant active:bg-surface-container-low rounded-lg transition-colors">
<span class="font-button-text">Show more details</span>
<span class="material-symbols-outlined">expand_more</span>
</button>
<div class="h-16"></div> <!-- Spacer for footer -->
</main>
<!-- Sticky Footer -->
<footer class="fixed bottom-0 left-0 w-full p-margin-mobile bg-white/80 backdrop-blur-xl shadow-[0_-8px_24px_rgba(0,0,0,0.08)] z-50">
<button class="w-full h-touch-target-min bg-secondary text-on-secondary rounded-lg font-button-text shadow-md active:scale-[0.98] transition-transform">
            Save Buyer
        </button>
</footer>
<!-- Invisible Bottom Nav Guard (Hidden for Form Mode as per instruction) -->
<nav class="hidden">
<div class="fixed bottom-0 w-full bg-white flex justify-around items-center p-4">
<span class="material-symbols-outlined" data-icon="today">today</span>
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="material-symbols-outlined" data-icon="notification_important">notification_important</span>
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
</nav>
</body></html>

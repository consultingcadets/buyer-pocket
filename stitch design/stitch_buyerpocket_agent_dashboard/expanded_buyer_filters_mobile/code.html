<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#84d5cb",
                        "primary-fixed": "#d6e3fa",
                        "surface-dim": "#dbd9db",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#000000",
                        "tertiary-fixed": "#d8e2ff",
                        "on-background": "#1b1b1d",
                        "primary-container": "#0f1c2c",
                        "inverse-surface": "#303032",
                        "surface-bright": "#fbf9fa",
                        "inverse-primary": "#bac7dd",
                        "on-tertiary-fixed-variant": "#004494",
                        "secondary-fixed": "#a0f1e7",
                        "on-primary-container": "#788599",
                        "surface-container": "#f0edef",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f2f0f1",
                        "error-container": "#ffdad6",
                        "outline-variant": "#c5c6cd",
                        "tertiary": "#000000",
                        "secondary": "#016a62",
                        "tertiary-fixed-dim": "#adc6ff",
                        "surface-tint": "#535f72",
                        "on-tertiary-container": "#3280f9",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#bac7dd",
                        "on-primary-fixed": "#0f1c2c",
                        "secondary-container": "#9deee4",
                        "on-secondary-fixed-variant": "#00504a",
                        "on-primary-fixed-variant": "#3b4859",
                        "on-error": "#ffffff",
                        "background": "#fbf9fa",
                        "surface-variant": "#e4e2e3",
                        "tertiary-container": "#001a41",
                        "on-tertiary-fixed": "#001a41",
                        "surface-container-low": "#f5f3f4",
                        "surface": "#fbf9fa",
                        "on-surface": "#1b1b1d",
                        "surface-container-highest": "#e4e2e3",
                        "outline": "#75777d",
                        "on-secondary-container": "#0c6f66",
                        "surface-container-high": "#eae7e9",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#44474c",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#00201d",
                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "48px",
                        "gutter": "16px",
                        "xs": "4px",
                        "margin-desktop": "32px",
                        "lg": "24px",
                        "md": "16px",
                        "xl": "32px",
                        "sm": "8px",
                        "unit": "4px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "title-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "button-text": ["Inter"],
                        "body-base": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "button-text": ["15px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "body-base": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-surface font-body-base text-on-surface">
<!-- Filter Sheet Shell -->
<div class="min-h-screen flex flex-col bg-white">
<!-- Header -->
<header class="sticky top-0 z-50 flex items-center justify-between h-16 px-margin-mobile bg-white/80 backdrop-blur-md border-b border-outline-variant/30">
<button class="w-touch-target-min h-touch-target-min flex items-center justify-start text-on-surface-variant hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-md text-title-sm text-on-surface">Filters</h1>
<button class="font-button-text text-secondary hover:opacity-70 transition-opacity">Reset</button>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-margin-mobile pb-32">
<!-- Suburb Selection -->
<section class="py-lg border-b border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Suburb</h2>
<div class="relative mb-sm">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full pl-10 pr-3 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:outline-none focus:border-secondary font-body-base text-on-surface" placeholder="Search suburbs..." type="text"/>
</div>
<div class="flex flex-wrap gap-xs">
<div class="flex items-center gap-1 px-3 py-1.5 bg-secondary-container text-on-secondary-container rounded-full text-body-sm font-medium">
                    Richmond
                    <span class="material-symbols-outlined text-[16px] cursor-pointer" data-icon="close">close</span>
</div>
<div class="flex items-center gap-1 px-3 py-1.5 bg-secondary-container text-on-secondary-container rounded-full text-body-sm font-medium">
                    South Yarra
                    <span class="material-symbols-outlined text-[16px] cursor-pointer" data-icon="close">close</span>
</div>
</div>
</section>
<!-- Budget Range -->
<section class="py-lg border-b border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Budget Range (AUD)</h2>
<div class="flex items-center gap-md">
<div class="flex-1">
<label class="block text-[10px] font-bold text-on-surface-variant mb-1 ml-1">MIN BUDGET</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-medium">$</span>
<input class="w-full pl-7 pr-3 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:outline-none focus:border-secondary font-body-base text-on-surface" placeholder="0" type="number" value="800000"/>
</div>
</div>
<div class="w-4 h-px bg-outline-variant self-end mb-5"></div>
<div class="flex-1">
<label class="block text-[10px] font-bold text-on-surface-variant mb-1 ml-1">MAX BUDGET</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-medium">$</span>
<input class="w-full pl-7 pr-3 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:outline-none focus:border-secondary font-body-base text-on-surface" placeholder="Any" type="number" value="2500000"/>
</div>
</div>
</div>
</section>
<!-- Bedrooms (Segmented control) -->
<section class="py-lg border-b border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Bedrooms</h2>
<div class="flex bg-surface-container p-1 rounded-xl">
<button class="flex-1 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">Any</button>
<button class="flex-1 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">1+</button>
<button class="flex-1 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">2+</button>
<button class="flex-1 py-2.5 rounded-lg font-button-text text-body-sm bg-white shadow-sm text-secondary">3+</button>
<button class="flex-1 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">4+</button>
<button class="flex-1 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">5+</button>
</div>
</section>
<!-- Land Size Minimum -->
<section class="py-lg border-b border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Land Size Minimum</h2>
<div class="flex bg-surface-container p-1 rounded-xl overflow-x-auto no-scrollbar">
<button class="flex-none px-5 py-2.5 rounded-lg font-button-text text-body-sm bg-white shadow-sm text-secondary">Any</button>
<button class="flex-none px-5 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">300m²</button>
<button class="flex-none px-5 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">400m²</button>
<button class="flex-none px-5 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">500m²</button>
<button class="flex-none px-5 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">600m²</button>
<button class="flex-none px-5 py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">700m²+</button>
</div>
</section>
<!-- Property Type (Multi-select chips) -->
<section class="py-lg border-b border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Property Type</h2>
<div class="flex flex-wrap gap-sm">
<button class="px-5 py-2.5 rounded-full font-button-text text-body-sm bg-secondary text-on-secondary shadow-sm">House</button>
<button class="px-5 py-2.5 rounded-full font-button-text text-body-sm border border-outline-variant text-on-surface-variant hover:bg-surface-container transition-colors">Townhouse</button>
<button class="px-5 py-2.5 rounded-full font-button-text text-body-sm bg-secondary text-on-secondary shadow-sm">Apartment/Unit</button>
<button class="px-5 py-2.5 rounded-full font-button-text text-body-sm border border-outline-variant text-on-surface-variant hover:bg-surface-container transition-colors">Land</button>
<button class="px-5 py-2.5 rounded-full font-button-text text-body-sm border border-outline-variant text-on-surface-variant hover:bg-surface-container transition-colors">Rural</button>
</div>
</section>
<!-- Buyer Temperature -->
<section class="py-lg border-b border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Buyer Temperature</h2>
<div class="grid grid-cols-3 gap-sm p-1 bg-surface-container rounded-xl">
<button class="py-2.5 rounded-lg font-button-text text-body-sm bg-white shadow-sm text-secondary">Hot</button>
<button class="py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">Warm</button>
<button class="py-2.5 rounded-lg font-button-text text-body-sm text-on-surface-variant hover:bg-white/50 transition-colors">Cold</button>
</div>
</section>
<!-- Buying Timeline -->
<section class="py-lg border-b border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Buying Timeline</h2>
<div class="flex flex-wrap gap-sm">
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">Ready now</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm bg-secondary text-on-secondary shadow-sm">1–3 months</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">3–6 months</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">6–12 months</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">12+ months</button>
</div>
</section>
<!-- Lead Status -->
<section class="py-lg border-b border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Lead Status</h2>
<div class="flex flex-wrap gap-sm">
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">New Lead</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border-2 border-secondary text-secondary flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Active
                </button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">Follow-up</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">On Hold</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">Under Contract</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">Lost</button>
</div>
</section>
<!-- Reminder Due -->
<section class="py-lg border-b border-outline-variant/30">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Reminder Due</h2>
<div class="flex flex-wrap gap-sm">
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm bg-secondary text-on-secondary shadow-sm">Any</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">Today</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">This week</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">Overdue</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">None set</button>
</div>
</section>
<!-- Last Contacted -->
<section class="py-lg">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-md uppercase tracking-wider">Last Contacted</h2>
<div class="flex flex-wrap gap-sm">
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm bg-secondary text-on-secondary shadow-sm">Any</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">This week</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">This month</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">Over a month</button>
<button class="px-4 py-2 rounded-lg font-button-text text-body-sm border border-outline-variant text-on-surface-variant">Never</button>
</div>
</section>
</main>
<!-- Sticky Footer CTA -->
<footer class="fixed bottom-0 left-0 w-full p-margin-mobile bg-white/95 backdrop-blur-md border-t border-outline-variant/30 flex justify-center z-50">
<button class="w-full max-w-lg h-touch-target-min bg-secondary text-on-secondary font-button-text text-body-base rounded-xl shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
            Show 142 Buyers
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
<!-- Decorative Background Element -->
<div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-secondary/5 via-transparent to-transparent"></div>
</div>
</body></html>

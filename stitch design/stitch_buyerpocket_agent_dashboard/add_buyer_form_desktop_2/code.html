<!DOCTYPE html>

<html class="light" lang="en-AU"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#788599",
                        "on-error": "#ffffff",
                        "surface-tint": "#535f72",
                        "surface-variant": "#e4e2e3",
                        "on-background": "#1b1b1d",
                        "surface-container-high": "#eae7e9",
                        "error": "#ba1a1a",
                        "primary-container": "#0f1c2c",
                        "tertiary": "#000000",
                        "surface-bright": "#fbf9fa",
                        "on-tertiary-fixed": "#001a41",
                        "outline-variant": "#c5c6cd",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#0f1c2c",
                        "tertiary-container": "#001a41",
                        "primary": "#000000",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#1b1b1d",
                        "on-tertiary-fixed-variant": "#004494",
                        "primary-fixed-dim": "#bac7dd",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#a0f1e7",
                        "on-secondary-container": "#0c6f66",
                        "secondary-fixed-dim": "#84d5cb",
                        "surface-dim": "#dbd9db",
                        "on-tertiary-container": "#3280f9",
                        "surface-container-low": "#f5f3f4",
                        "secondary-container": "#9deee4",
                        "secondary": "#016a62",
                        "on-secondary-fixed-variant": "#00504a",
                        "on-surface-variant": "#44474c",
                        "inverse-on-surface": "#f2f0f1",
                        "background": "#fbf9fa",
                        "surface": "#fbf9fa",
                        "on-primary": "#ffffff",
                        "outline": "#75777d",
                        "inverse-surface": "#303032",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#adc6ff",
                        "inverse-primary": "#bac7dd",
                        "surface-container-highest": "#e4e2e3",
                        "tertiary-fixed": "#d8e2ff",
                        "surface-container": "#f0edef",
                        "primary-fixed": "#d6e3fa",
                        "on-primary-fixed-variant": "#3b4859",
                        "on-secondary-fixed": "#00201d"
                    },
                    "spacing": {
                        "touch-target-min": "48px",
                        "xl": "32px",
                        "lg": "24px",
                        "xs": "4px",
                        "margin-desktop": "32px",
                        "sm": "8px",
                        "gutter": "16px",
                        "margin-mobile": "16px",
                        "md": "16px",
                        "unit": "4px"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen">
<!-- Desktop SideNavBar -->
<aside class="fixed left-0 top-0 h-full w-[224px] bg-[#0F1C2C] border-r border-gray-800 flex flex-col justify-between p-4 z-50">
<div class="flex flex-col gap-6">
<div class="px-2">
<h1 class="text-xl font-bold text-white tracking-tight">BuyerPocket</h1>
<p class="text-xs text-white/60 font-medium tracking-tight">Agent Portal</p>
</div>
<nav class="flex flex-col gap-1">
<a class="text-white/90 hover:bg-white/5 rounded-md px-3 py-2 flex items-center gap-3 transition-colors font-inter text-sm font-medium tracking-tight" href="#">
<span class="material-symbols-outlined" data-icon="today">today</span>
                    Today
                </a>
<a class="bg-[#006A62] text-white rounded-md px-3 py-2 flex items-center gap-3 font-inter text-sm font-medium tracking-tight" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
                    Buyers
                </a>
<a class="text-white/90 hover:bg-white/5 rounded-md px-3 py-2 flex items-center gap-3 transition-colors font-inter text-sm font-medium tracking-tight" href="#">
<span class="material-symbols-outlined" data-icon="notification_important">notification_important</span>
                    Reminders
                </a>
<a class="text-white/90 hover:bg-white/5 rounded-md px-3 py-2 flex items-center gap-3 transition-colors font-inter text-sm font-medium tracking-tight" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
                    Settings
                </a>
</nav>
</div>
<button class="w-full bg-[#006A62] text-white rounded-md px-4 py-3 font-semibold text-sm hover:opacity-90 active:scale-95 duration-100 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
            Add Buyer
        </button>
</aside>
<!-- Main Content Canvas -->
<main class="ml-[224px] pb-24">
<!-- Header -->
<header class="sticky top-0 w-full z-40 bg-white border-b border-gray-200 shadow-sm flex justify-between items-center h-16 px-8">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-gray-100 rounded-full transition-colors">
<span class="material-symbols-outlined text-gray-600" data-icon="arrow_back">arrow_back</span>
</button>
<h2 class="font-inter font-semibold text-gray-900 text-lg">Add New Buyer</h2>
</div>
<div class="flex items-center gap-6">
<div class="relative hidden lg:block">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" data-icon="search">search</span>
<input class="pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-lg text-sm w-64 focus:ring-2 focus:ring-secondary" placeholder="Search buyers..." type="text"/>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-gray-500 cursor-pointer hover:text-secondary transition-colors" data-icon="notifications">notifications</span>
<span class="material-symbols-outlined text-gray-500 cursor-pointer hover:text-secondary transition-colors" data-icon="account_circle">account_circle</span>
</div>
</div>
</header>
<!-- Form Content -->
<div class="max-w-5xl mx-auto px-8 py-10">
<div class="grid grid-cols-12 gap-8">
<!-- Left Column -->
<div class="col-span-12 lg:col-span-7 flex flex-col gap-8">
<!-- Identity Card -->
<section class="bg-white rounded-xl border border-gray-200 p-6 flex flex-col gap-6">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary" data-icon="person">person</span>
<h3 class="font-inter font-semibold text-gray-900 uppercase tracking-wider text-xs">Buyer Identity</h3>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="col-span-2">
<label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
<input class="w-full rounded-lg border-gray-200 focus:border-secondary focus:ring-secondary transition-all" placeholder="e.g. Cameron Knight" type="text"/>
</div>
<div class="col-span-1">
<label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
<input class="w-full rounded-lg border-gray-200 focus:border-secondary focus:ring-secondary transition-all" placeholder="+61 400 000 000" type="tel"/>
</div>
<div class="col-span-1">
<label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
<input class="w-full rounded-lg border-gray-200 focus:border-secondary focus:ring-secondary transition-all" placeholder="cameron@example.com.au" type="email"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-3">Buyer Temperature</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-red-100 bg-red-50 text-red-700 text-xs font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-red-100 transition-colors">
<span class="w-2 h-2 rounded-full bg-red-500"></span>
                                    Hot
                                </button>
<button class="px-4 py-2 rounded-full border border-orange-100 bg-orange-50 text-orange-700 text-xs font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-orange-100 transition-colors">
<span class="w-2 h-2 rounded-full bg-orange-500"></span>
                                    Warm
                                </button>
<button class="px-4 py-2 rounded-full border border-blue-100 bg-blue-50 text-blue-700 text-xs font-bold uppercase tracking-widest flex items-center gap-2 hover:bg-blue-100 transition-colors">
<span class="w-2 h-2 rounded-full bg-blue-500"></span>
                                    Cold
                                </button>
</div>
</div>
</section>
<!-- Status & Timeline Card -->
<section class="bg-white rounded-xl border border-gray-200 p-6 flex flex-col gap-6">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary" data-icon="monitoring">monitoring</span>
<h3 class="font-inter font-semibold text-gray-900 uppercase tracking-wider text-xs">Engagement Status</h3>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-3">Lead Status</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-gray-200 text-gray-600 text-xs font-semibold hover:border-secondary hover:text-secondary transition-all">New Inquiry</button>
<button class="px-4 py-2 rounded-full border-2 border-secondary bg-secondary/5 text-secondary text-xs font-bold">Appraised</button>
<button class="px-4 py-2 rounded-full border border-gray-200 text-gray-600 text-xs font-semibold hover:border-secondary hover:text-secondary transition-all">Negotiating</button>
<button class="px-4 py-2 rounded-full border border-gray-200 text-gray-600 text-xs font-semibold hover:border-secondary hover:text-secondary transition-all">Lost</button>
</div>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-3">Buying Timeline</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-gray-200 text-gray-600 text-xs font-semibold hover:border-secondary hover:text-secondary transition-all">ASAP</button>
<button class="px-4 py-2 rounded-full border border-gray-200 text-gray-600 text-xs font-semibold hover:border-secondary hover:text-secondary transition-all">1-3 Months</button>
<button class="px-4 py-2 rounded-full border border-gray-200 text-gray-600 text-xs font-semibold hover:border-secondary hover:text-secondary transition-all">3-6 Months</button>
<button class="px-4 py-2 rounded-full border border-gray-200 text-gray-600 text-xs font-semibold hover:border-secondary hover:text-secondary transition-all">Just Browsing</button>
</div>
</div>
</section>
<!-- Notes -->
<section class="bg-white rounded-xl border border-gray-200 p-6">
<label class="block text-sm font-medium text-gray-700 mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-gray-400" data-icon="edit_note">edit_note</span>
                            Internal Notes
                        </label>
<textarea class="w-full rounded-lg border-gray-200 focus:border-secondary focus:ring-secondary transition-all text-sm" placeholder="Mention specific requirements, family situation, or urgency factors..." rows="4"></textarea>
</section>
</div>
<!-- Right Column -->
<div class="col-span-12 lg:col-span-5 flex flex-col gap-8">
<!-- Property Requirements Card -->
<section class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
<div class="h-32 bg-gray-100 relative">
<img alt="Property context" class="w-full h-full object-cover opacity-60 mix-blend-multiply" data-alt="A premium, sun-drenched architectural rendering of a modern Australian suburban landscape. The image features clean lines of contemporary residential homes with lush greenery and native plants under a clear blue sky. The lighting is bright and airy, reflecting a high-end real estate aesthetic with a palette of soft greys and vibrant natural tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvu5zg4czS1dDwyhNtLOPPLiVwpYEsc29BCE4Jaj4Jqzn-8umabQkEJKx9VCh7PM2QTdlQTIpuAQ6x_Dz8FdPOeSRXu0-VXNDr-6vGlrIzeNT_zN1720cFOntMi8ApabOLsTxxcNqdK-_KPM1J2ojX9BRXPLu81foPcmKfyB5ePfnvv7pWaFGtCPo7DvwRmXZ211uqt_gkxjem1j1iDjqIUcyn8ijDaJcbBDx3XLcc_wQ3tnlgrkgLPGVyInvZU-JcDtDpQDWT0u8"/>
<div class="absolute inset-0 bg-gradient-to-t from-white to-transparent"></div>
<div class="absolute bottom-4 left-6 flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="location_on">location_on</span>
<h3 class="font-inter font-semibold text-gray-900 uppercase tracking-wider text-xs">Search Criteria</h3>
</div>
</div>
<div class="p-6 flex flex-col gap-6">
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Target Suburbs</label>
<div class="relative">
<input class="w-full rounded-lg border-gray-200 focus:border-secondary focus:ring-secondary transition-all pl-10" placeholder="e.g. Paddington, Woollahra" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm" data-icon="search">search</span>
</div>
<div class="mt-2 flex flex-wrap gap-1">
<span class="inline-flex items-center gap-1 bg-secondary/10 text-secondary text-[10px] font-bold px-2 py-1 rounded-md">PADDINGTON <span class="material-symbols-outlined text-[12px] cursor-pointer" data-icon="close">close</span></span>
<span class="inline-flex items-center gap-1 bg-secondary/10 text-secondary text-[10px] font-bold px-2 py-1 rounded-md">SURRY HILLS <span class="material-symbols-outlined text-[12px] cursor-pointer" data-icon="close">close</span></span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Min Budget</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">$</span>
<input class="w-full rounded-lg border-gray-200 focus:border-secondary focus:ring-secondary transition-all pl-7 text-sm" placeholder="1,200,000" type="number"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Max Budget</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">$</span>
<input class="w-full rounded-lg border-gray-200 focus:border-secondary focus:ring-secondary transition-all pl-7 text-sm" placeholder="2,500,000" type="number"/>
</div>
</div>
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-3">Minimum Bedrooms</label>
<div class="flex bg-surface-container-low rounded-lg p-1">
<button class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">Any</button>
<button class="flex-1 py-2 text-sm font-bold bg-white text-secondary rounded shadow-sm">2+</button>
<button class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">3+</button>
<button class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">4+</button>
<button class="flex-1 py-2 text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">5+</button>
</div>
</div>
<button class="w-full flex items-center justify-between py-3 px-4 border border-dashed border-gray-300 rounded-lg text-gray-500 hover:border-secondary hover:text-secondary transition-all group">
<span class="text-sm font-medium">Show more details</span>
<span class="material-symbols-outlined group-hover:translate-y-1 transition-transform" data-icon="expand_more">expand_more</span>
</button>
</div>
</section>
<!-- Summary Card (Bento Style Accent) -->
</div>
</div>
</div>
</main>
<!-- Sticky Footer -->
<footer class="fixed bottom-0 left-[224px] right-0 bg-white border-t border-gray-100 px-8 py-4 z-50 flex justify-center">
<div class="max-w-5xl w-full flex gap-4">
<button class="px-8 py-3 border border-gray-200 rounded-lg text-gray-600 font-semibold text-sm hover:bg-gray-50 transition-colors">Discard</button>
<button class="flex-1 py-3 bg-[#006A62] text-white rounded-lg font-bold text-sm shadow-lg shadow-secondary/20 hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="save" style="font-variation-settings: 'FILL' 1;">save</span>
                Save Buyer Profile
            </button>
</div>
</footer>
</body></html>

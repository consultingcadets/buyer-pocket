<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface antialiased min-h-screen flex justify-center">
<!-- Mobile Constraint Wrapper (375px) -->
<div class="w-full max-w-[375px] bg-background min-h-screen relative flex flex-col overflow-hidden shadow-2xl">
<!-- TopAppBar (from JSON) -->
<header class="bg-white flex justify-between items-center h-16 px-4 md:px-8 w-full docked full-width top-0 z-50 border-b border-[#E0E1DD] shadow-sm shadow-[#0F1C2C]/5 shrink-0">
<!-- Leading Icon -->
<button class="text-slate-600 hover:bg-slate-50 transition-colors duration-200 p-2 -ml-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">menu</span>
</button>
<!-- Headline -->
<h1 class="font-sans text-sm font-semibold tracking-tight text-xl font-black text-[#0F1C2C]">BuyerPocket</h1>
<!-- Trailing Avatar -->
<div class="h-8 w-8 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant shrink-0">
<img alt="User Profile" class="h-full w-full object-cover" data-alt="Professional headshot of a smiling real estate agent in a modern office" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_OJQttFqS9oxiZApIOu03-ar4UrrCHw8yHcCpQoKiiC3M9BCCFe3jMaUhxtVHWB775H4yBnBlK_WPxzWUbClXSAFvpvND8QOi0yVEnCgy4jGqxjbm-bNnLJfUHB_cJgKMieVMne2sa9v3Go_Yp8LYMkHWgCQlVoNxsQ92NVR1JmsRj_RwpTJT8IAa1OlIgBA3rlFmTaeDk6hoIev3eE7YzBAOvLi0OEYWtMdjl8FJnBPauxDqvVLQyRxbKHT6TiQp_QRI1E3OzkMy"/>
</div>
</header>
<!-- Trial Ending Banner -->
<div class="bg-tertiary-fixed px-md py-sm flex flex-col gap-xs shrink-0 z-40">
<div class="flex items-start gap-sm">
<span class="material-symbols-outlined text-[20px] text-on-tertiary-fixed mt-[2px]" style="font-variation-settings: 'FILL' 1;">error</span>
<div class="flex-1">
<p class="font-body-sm text-body-sm text-on-tertiary-fixed">Your free trial ends in 3 days.</p>
<div class="flex items-center justify-between mt-1">
<span class="font-body-sm text-body-sm text-on-tertiary-fixed opacity-90">Add payment to continue.</span>
<button class="font-label-bold text-label-bold text-on-tertiary-fixed border-b border-on-tertiary-fixed pb-[1px]">Add payment</button>
</div>
</div>
</div>
</div>
<!-- Main Content Scrollable Area -->
<main class="flex-1 overflow-y-auto pb-[88px] px-md pt-lg flex flex-col gap-lg">
<!-- Header Section -->
<section class="flex flex-col gap-xs">
<p class="font-body-md text-body-md text-on-surface-variant">Tuesday, Oct 24</p>
<h2 class="font-h2 text-h2 text-on-surface">Good morning.</h2>
</section>
<!-- Bento Grid - Quick Stats -->
<section class="grid grid-cols-2 gap-md">
<!-- Leads Card -->
<div class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant shadow-sm flex flex-col justify-between aspect-square">
<div class="flex justify-between items-start">
<div class="h-8 w-8 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed">
<span class="material-symbols-outlined text-[18px]">group_add</span>
</div>
<span class="font-label-bold text-label-bold text-on-surface-variant bg-surface-container-low px-2 py-1 rounded-full text-[10px]">+12%</span>
</div>
<div class="mt-auto">
<p class="font-h1 text-h1 text-on-surface leading-none mb-1">14</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">New Leads</p>
</div>
</div>
<!-- Tasks Card -->
<div class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant shadow-sm flex flex-col justify-between aspect-square">
<div class="flex justify-between items-start">
<div class="h-8 w-8 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined text-[18px]">task_alt</span>
</div>
<span class="material-symbols-outlined text-outline text-[16px]">more_horiz</span>
</div>
<div class="mt-auto">
<p class="font-h1 text-h1 text-on-surface leading-none mb-1">5</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">Tasks Due</p>
</div>
</div>
</section>
<!-- Upcoming Appraisals Section -->
<section class="flex flex-col gap-md">
<div class="flex justify-between items-end">
<h3 class="font-h3 text-h3 text-on-surface">Upcoming</h3>
<button class="font-label-bold text-label-bold text-primary-container">View all</button>
</div>
<!-- List Item -->
<div class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant shadow-sm flex items-center gap-md">
<div class="h-12 w-12 rounded-lg bg-surface-container flex flex-col items-center justify-center shrink-0 border border-outline-variant/50">
<span class="font-label-bold text-label-bold text-on-surface text-[10px] uppercase">Oct</span>
<span class="font-h3 text-h3 text-on-surface leading-none">24</span>
</div>
<div class="flex-1 min-w-0">
<h4 class="font-label-bold text-label-bold text-on-surface truncate">142 Riverside Drive</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant truncate mt-[2px]">Appraisal • 2:00 PM</p>
</div>
<button class="h-8 w-8 rounded-full bg-surface-container-low flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high shrink-0">
<span class="material-symbols-outlined text-[18px]">chevron_right</span>
</button>
</div>
<!-- List Item -->
<div class="bg-surface-container-lowest rounded-xl p-md border border-outline-variant shadow-sm flex items-center gap-md">
<div class="h-12 w-12 rounded-lg bg-surface-container flex flex-col items-center justify-center shrink-0 border border-outline-variant/50">
<span class="font-label-bold text-label-bold text-on-surface text-[10px] uppercase">Oct</span>
<span class="font-h3 text-h3 text-on-surface leading-none">25</span>
</div>
<div class="flex-1 min-w-0">
<h4 class="font-label-bold text-label-bold text-on-surface truncate">8/12 Sarah Street</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant truncate mt-[2px]">Follow-up Call • 10:30 AM</p>
</div>
<button class="h-8 w-8 rounded-full bg-surface-container-low flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high shrink-0">
<span class="material-symbols-outlined text-[18px]">chevron_right</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar (from JSON) -->
<nav class="bg-white fixed bottom-0 left-0 w-full flex justify-around items-center h-16 pb-safe fixed bottom-0 w-full z-50 border-t border-[#E0E1DD] shadow-[0_-1px_3px_rgba(15,28,44,0.05)]">
<!-- Tab 1: Listings (Active) -->
<button class="flex flex-col items-center justify-center text-[#2EC4B6] p-2 flex-1 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home_work</span>
<span class="text-[10px] font-bold uppercase tracking-tighter mt-1">Listings</span>
</button>
<!-- Tab 2: Leads (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 p-2 flex-1 hover:text-[#3A86FF] active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined">person_search</span>
<span class="text-[10px] font-bold uppercase tracking-tighter mt-1">Leads</span>
</button>
<!-- Tab 3: Billing (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 p-2 flex-1 hover:text-[#3A86FF] active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined">payments</span>
<span class="text-[10px] font-bold uppercase tracking-tighter mt-1">Billing</span>
</button>
<!-- Tab 4: Account (Inactive) -->
<button class="flex flex-col items-center justify-center text-slate-500 p-2 flex-1 hover:text-[#3A86FF] active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-tighter mt-1">Account</span>
</button>
</nav>
</div>
</body></html>

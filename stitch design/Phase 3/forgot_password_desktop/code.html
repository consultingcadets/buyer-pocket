<body class="bg-background min-h-screen flex flex-col antialiased">
<!-- Main Content Area - Centered Layout for Transactional Page -->
<main class="flex-grow flex flex-col items-center justify-center p-md sm:p-lg md:p-margin w-full">
<!-- Centered Card Container -->
<div class="w-full max-w-[480px]">
<!-- Logo - Placed outside/above card for clean hierarchy, or inside depending on preference. Putting inside per prompt: "BuyerPocket wordmark at top, centered." -->
<div class="bg-surface-container-lowest rounded-lg shadow-level-1 p-lg md:p-xl w-full flex flex-col gap-lg">
<!-- Brand Anchor -->
<div class="flex justify-center w-full pb-sm">
<span class="font-h2 text-h2 text-primary-container tracking-tight">BuyerPocket</span>
</div>
<!-- Header Content -->
<div class="flex flex-col gap-base text-center">
<h1 class="font-h3 text-h3 text-on-surface">Forgot your password?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                        Enter the email address associated with your account and we'll send you a link to reset your password.
                    </p>
</div>
<!-- Form Area -->
<form class="flex flex-col gap-lg mt-sm">
<!-- Email Input Group -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface-variant mb-xs" for="email">Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded p-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-electric-blue focus:ring-1 focus:ring-electric-blue transition-colors h-[48px]" id="email" name="email" placeholder="e.g. james@eliterealty.com.au" type="email"/>
</div>
<!-- Actions -->
<div class="flex flex-col gap-md pt-sm">
<button class="w-full bg-fresh-teal hover:bg-[#26A69A] text-on-primary font-label-bold text-label-bold py-[14px] px-md rounded transition-colors duration-200 flex justify-center items-center h-[48px]" type="button">
                            Send reset link
                        </button>
<a class="w-full text-center text-primary-container hover:text-electric-blue font-body-md text-body-md transition-colors duration-200 py-sm inline-block" href="#">
                            Back to login
                        </a>
</div>
</form>
</div>
<!-- Footer Caption -->
<div class="mt-lg text-center w-full">
<p class="font-body-sm text-body-sm text-on-surface-variant opacity-70">
                    © 2026 BuyerPocket. Built in Australia.
                </p>
</div>
</div>

<!-- Navigation Shell suppressed as per intent rule: Transactional screen -->

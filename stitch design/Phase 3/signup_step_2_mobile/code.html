<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Signup Step 2: Eligibility Check</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        [data-weight="fill"] {
            font-variation-settings: 'FILL' 1;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background min-h-screen flex flex-col font-body text-on-background">
<!-- Top App Bar (Simplified for flow) -->
<header class="bg-surface-container-lowest text-primary-container font-h3 flex justify-between items-center w-full px-sm py-xs border-b border-surface-variant sticky top-0 z-10 md:hidden">
<button aria-label="Go back" class="p-xs text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="text-h3 font-h3 tracking-tight">BuyerPocket</span>
<button aria-label="Help" class="p-xs text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center rounded-full">
<span class="material-symbols-outlined">help_outline</span>
</button>
</header>
<main class="flex-grow flex flex-col items-center p-sm md:p-lg md:justify-center w-full max-w-container-max mx-auto">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(13,27,42,0.05)] border border-surface-variant overflow-hidden flex flex-col">
<!-- Progress Indicator -->
<div class="px-md pt-md pb-sm flex justify-center gap-xs">
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<div class="px-md pb-md flex-grow flex flex-col gap-md">
<h2 class="font-h2 text-h2 text-on-background text-center">Quick question first.</h2>
<!-- Radio Group -->
<div aria-labelledby="eligibility-question" class="flex flex-col gap-sm" role="radiogroup">
<!-- Option 1 -->
<label class="flex items-start gap-xs p-sm rounded-lg border border-surface-variant bg-surface-container-lowest cursor-pointer hover:border-outline-variant transition-colors group">
<div class="flex items-center h-6">
<input class="w-5 h-5 text-secondary border-outline-variant focus:ring-secondary focus:ring-offset-surface-container-lowest bg-surface-container-lowest" name="eligibility" type="radio" value="1"/>
</div>
<div class="flex flex-col">
<span class="font-button text-button text-on-surface group-hover:text-primary">Yes, I am a licensed agent</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-base">I hold a current real estate license in Australia.</span>
</div>
</label>
<!-- Option 2 -->
<label class="flex items-start gap-xs p-sm rounded-lg border border-surface-variant bg-surface-container-lowest cursor-pointer hover:border-outline-variant transition-colors group">
<div class="flex items-center h-6">
<input class="w-5 h-5 text-secondary border-outline-variant focus:ring-secondary focus:ring-offset-surface-container-lowest bg-surface-container-lowest" name="eligibility" type="radio" value="2"/>
</div>
<div class="flex flex-col">
<span class="font-button text-button text-on-surface group-hover:text-primary">I work for an agency</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-base">I am employed by a registered real estate office.</span>
</div>
</label>
<!-- Option 3 (Selected) -->
<label class="flex items-start gap-xs p-sm rounded-lg border border-primary-container bg-surface-container-low cursor-pointer relative">
<div class="flex items-center h-6">
<input checked="" class="w-5 h-5 text-secondary border-primary-container focus:ring-secondary focus:ring-offset-surface-container-low bg-surface-container-lowest" name="eligibility" type="radio" value="3"/>
</div>
<div class="flex flex-col">
<span class="font-button text-button text-primary-container">I am not sure yet</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-base">I need to check my current status or agency rules.</span>
</div>
</label>
<!-- Option 4 -->
<label class="flex items-start gap-xs p-sm rounded-lg border border-surface-variant bg-surface-container-lowest cursor-pointer hover:border-outline-variant transition-colors group">
<div class="flex items-center h-6">
<input class="w-5 h-5 text-secondary border-outline-variant focus:ring-secondary focus:ring-offset-surface-container-lowest bg-surface-container-lowest" name="eligibility" type="radio" value="4"/>
</div>
<div class="flex flex-col">
<span class="font-button text-button text-on-surface group-hover:text-primary">No, I am an independent buyer</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-base">I am looking to purchase property for myself.</span>
</div>
</label>
</div>
<!-- Warning Card (Visible because Option 3 is selected) -->
<div class="bg-surface-container p-sm rounded-lg border border-surface-variant flex flex-col gap-sm">
<div class="flex gap-xs items-start">
<span class="material-symbols-outlined text-primary-container flex-shrink-0" data-icon="info">info</span>
<p class="font-body-sm text-body-sm text-primary-container">
                            BuyerPocket is designed specifically for licensed real estate professionals. Please ensure you comply with your agency's contract terms regarding third-party software usage before proceeding.
                        </p>
</div>
</div>
</div>
<!-- Actions -->
<div class="p-md flex flex-col gap-sm border-t border-surface-variant bg-surface-container-lowest mt-auto">
<button class="w-full h-12 bg-secondary text-on-secondary font-button text-button rounded-lg flex items-center justify-center hover:bg-[#005049] transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2">
                    I've confirmed, continue
                </button>
<button class="w-full h-12 bg-transparent text-on-surface-variant font-button text-button rounded-lg border border-outline-variant flex items-center justify-center hover:bg-surface-container-low hover:text-on-surface transition-colors focus:outline-none focus:ring-2 focus:ring-outline-variant focus:ring-offset-2">
                    I'll come back later
                </button>
</div>
</div>
</main>
</body></html>

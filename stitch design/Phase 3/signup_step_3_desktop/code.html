<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BuyerPocket - Profile Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#fbf9fa",
                        "surface-container-low": "#f5f3f4",
                        "surface-tint": "#535f72",
                        "secondary": "#006a62",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#303032",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#feddb9",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#3b4859",
                        "on-tertiary-fixed": "#281803",
                        "surface-bright": "#fbf9fa",
                        "outline-variant": "#c5c6cd",
                        "primary-fixed-dim": "#bac7dd",
                        "surface-container": "#f0edef",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#70f8e8",
                        "tertiary-container": "#281803",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e4e2e3",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#44474c",
                        "primary-container": "#0f1c2c",
                        "surface-dim": "#dbd9db",
                        "surface-variant": "#e4e2e3",
                        "tertiary": "#000000",
                        "secondary-container": "#70f8e8",
                        "on-primary-container": "#788599",
                        "on-surface": "#1b1b1d",
                        "on-secondary-fixed-variant": "#005049",
                        "on-secondary-fixed": "#00201d",
                        "surface-container-high": "#eae7e9",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f2f0f1",
                        "primary": "#000000",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#e0c19f",
                        "on-background": "#1b1b1d",
                        "on-secondary-container": "#007168",
                        "primary-fixed": "#d6e3fa",
                        "on-primary-fixed": "#0f1c2c",
                        "on-tertiary-container": "#9a7f60",
                        "background": "#fbf9fa",
                        "on-tertiary-fixed-variant": "#584328",
                        "outline": "#75777d",
                        "inverse-primary": "#bac7dd",
                        "secondary-fixed-dim": "#4fdbcc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "16px",
                        "xl": "48px",
                        "lg": "32px",
                        "container-max": "1280px",
                        "xs": "8px",
                        "md": "24px",
                        "gutter": "24px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "h3": ["Inter"],
                        "h2": ["Inter"],
                        "button": ["Inter"],
                        "label-caps": ["Inter"],
                        "h1": ["Inter"],
                        "body": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "h3": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "h2": ["32px", {"lineHeight": "1.25", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "button": ["16px", {"lineHeight": "1", "fontWeight": "600"}],
                        "label-caps": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background h-full flex flex-col items-center justify-center p-sm md:p-lg antialiased">
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-lg shadow-[0px_4px_20px_rgba(13,27,42,0.05)] border border-surface-variant p-lg flex flex-col gap-lg">
<!-- Header & Progress -->
<div class="flex flex-col gap-md items-center text-center">
<div class="font-h2 text-h2 text-on-surface tracking-tight font-bold">BuyerPocket</div>
<div class="flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
</div>
<div class="flex flex-col gap-xs">
<h1 class="font-h2 text-h2 text-on-surface">Set up your profile</h1>
<p class="font-body text-body text-on-surface-variant">Complete your professional details to personalize your BuyerPocket experience.</p>
</div>
</div>
<!-- Form Elements -->
<form class="flex flex-col gap-md">
<!-- Agency Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="agency">Agency name <span class="text-on-surface-variant font-normal normal-case ml-1">(Optional)</span></label>
<input class="w-full h-[48px] px-sm bg-surface-container-lowest border border-outline-variant rounded focus:border-secondary-fixed focus:ring-1 focus:ring-secondary-fixed outline-none transition-colors font-body text-body text-on-surface placeholder:text-outline" id="agency" name="agency" placeholder="e.g. Ray White, LJ Hooker" type="text"/>
<p class="font-body-sm text-body-sm text-on-surface-variant">This will appear on reports and client communications.</p>
</div>
<!-- State Dropdown -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="state">State</label>
<div class="relative">
<select class="w-full h-[48px] px-sm appearance-none bg-surface-container-lowest border border-outline-variant rounded focus:border-secondary-fixed focus:ring-1 focus:ring-secondary-fixed outline-none transition-colors font-body text-body text-on-surface" id="state" name="state">
<option disabled="" selected="" value="">Select a State</option>
<option value="NSW">New South Wales (NSW)</option>
<option value="VIC">Victoria (VIC)</option>
<option value="QLD">Queensland (QLD)</option>
<option value="WA">Western Australia (WA)</option>
<option value="SA">South Australia (SA)</option>
<option value="TAS">Tasmania (TAS)</option>
<option value="ACT">Australian Capital Territory (ACT)</option>
<option value="NT">Northern Territory (NT)</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Timezone Dropdown -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="timezone">Timezone</label>
<div class="relative">
<select class="w-full h-[48px] px-sm appearance-none bg-surface-container-lowest border border-outline-variant rounded focus:border-secondary-fixed focus:ring-1 focus:ring-secondary-fixed outline-none transition-colors font-body text-body text-on-surface" id="timezone" name="timezone">
<option disabled="" selected="" value="">Select a Timezone</option>
<option value="AEST">Australian Eastern Standard Time (AEST)</option>
<option value="AEDT">Australian Eastern Daylight Time (AEDT)</option>
<option value="ACST">Australian Central Standard Time (ACST)</option>
<option value="ACDT">Australian Central Daylight Time (ACDT)</option>
<option value="AWST">Australian Western Standard Time (AWST)</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm mt-sm">
<button class="w-full h-[48px] bg-secondary hover:bg-on-secondary-container text-on-secondary font-button text-button rounded flex items-center justify-center transition-colors" type="submit">
                    Continue
                </button>
<button class="w-full h-[48px] bg-transparent hover:bg-surface-container-low text-on-surface font-button text-button rounded flex items-center justify-center transition-colors" type="button">
                    Back
                </button>
</div>
</form>
</div>
</body></html>

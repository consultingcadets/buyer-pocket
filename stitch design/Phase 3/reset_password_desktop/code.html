<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center items-center p-md antialiased selection:bg-brand-teal selection:text-white">
<!-- Main Container -->
<main class="w-full max-w-[480px] flex flex-col gap-xl">
<!-- Logo -->
<div class="flex justify-center w-full">
<span class="text-brand-navy font-h3 text-h3 tracking-tight">BuyerPocket</span>
</div>
<!-- Card -->
<div class="bg-surface-container-lowest rounded-lg shadow-level-1 p-lg md:p-xl w-full flex flex-col gap-lg">
<!-- Header Area -->
<div class="flex flex-col gap-sm text-center">
<h1 class="font-h2 text-h2 text-brand-navy">Reset your password</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Choose a new, strong password for your account.</p>
</div>
<!-- Form Area -->
<form class="flex flex-col gap-margin mt-sm">
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface" for="new-password">New password</label>
<div class="relative w-full">
<input class="w-full bg-surface-container-lowest border border-[#E0E1DD] rounded text-on-surface font-body-md text-body-md px-md py-[12px] focus:ring-0 focus:border-[#3A86FF] focus:border-2 transition-all outline-none placeholder:text-outline-variant" id="new-password" name="new-password" placeholder="Enter new password" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-brand-navy font-body-sm text-body-sm transition-colors focus:outline-none" type="button">
                            Show
                        </button>
</div>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface" for="confirm-password">Confirm new password</label>
<div class="relative w-full">
<input class="w-full bg-surface-container-lowest border border-[#E0E1DD] rounded text-on-surface font-body-md text-body-md px-md py-[12px] focus:ring-0 focus:border-[#3A86FF] focus:border-2 transition-all outline-none placeholder:text-outline-variant" id="confirm-password" name="confirm-password" placeholder="Confirm your password" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-[#2EC4B6] text-white font-label-bold text-label-bold rounded py-[14px] px-lg hover:bg-opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#2EC4B6] mt-sm" type="submit">
                    Update password
                </button>
</form>
</div>
<!-- Footer Caption -->
<div class="text-center w-full">
<p class="font-body-sm text-body-sm text-outline">
                Need help? <a class="text-[#3A86FF] hover:underline focus:outline-none" href="#">Contact Support</a>
</p>
</div>
</main>
</body></html>

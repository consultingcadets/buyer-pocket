<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BuyerPocket - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1b1b1d",
                        "surface-variant": "#e4e2e3",
                        "primary-fixed": "#d6e3fa",
                        "on-secondary-fixed-variant": "#005049",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e2e3",
                        "tertiary": "#000000",
                        "on-surface-variant": "#44474c",
                        "on-background": "#1b1b1d",
                        "surface": "#fbf9fa",
                        "surface-container-low": "#f5f3f4",
                        "on-secondary-container": "#007168",
                        "primary-fixed-dim": "#bac7dd",
                        "surface-bright": "#fbf9fa",
                        "secondary-fixed": "#70f8e8",
                        "tertiary-container": "#281803",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dbd9db",
                        "inverse-primary": "#bac7dd",
                        "on-secondary-fixed": "#00201d",
                        "tertiary-fixed-dim": "#e0c19f",
                        "secondary-fixed-dim": "#4fdbcc",
                        "outline-variant": "#c5c6cd",
                        "inverse-surface": "#303032",
                        "surface-tint": "#535f72",
                        "secondary-container": "#70f8e8",
                        "on-tertiary-fixed-variant": "#584328",
                        "primary-container": "#0f1c2c",
                        "surface-container": "#f0edef",
                        "background": "#fbf9fa",
                        "tertiary-fixed": "#feddb9",
                        "surface-container-high": "#eae7e9",
                        "on-error-container": "#93000a",
                        "secondary": "#006a62",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f2f0f1",
                        "on-primary-fixed-variant": "#3b4859",
                        "primary": "#000000",
                        "on-primary-container": "#788599",
                        "on-error": "#ffffff",
                        "outline": "#75777d",
                        "on-tertiary-container": "#9a7f60",
                        "on-tertiary-fixed": "#281803",
                        "on-primary-fixed": "#0f1c2c",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        
                        "brand-teal": "#2EC4B6",
                        "brand-navy": "#0F1C2C",
                        "brand-electric": "#3A86FF"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "card": "8px",
                        "input": "8px"
                    },
                    "spacing": {
                        "md": "16px",
                        "lg": "24px",
                        "gutter": "24px",
                        "xl": "32px",
                        "xxl": "48px",
                        "sm": "8px",
                        "margin": "24px",
                        "xs": "4px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "h3": ["Inter"],
                        "h2": ["Inter"],
                        "label-bold": ["Inter"],
                        "h1": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "h3": ["24px", {"lineHeight": "1.3", "letterSpacing": "0em", "fontWeight": "600"}],
                        "h2": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-bold": ["14px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "logo": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "caption": ["12px", {"lineHeight": "1.4", "fontWeight": "400"}]
                    },
                    "boxShadow": {
                        "card-resting": "0 2px 8px -2px rgba(15, 28, 44, 0.08), 0 1px 4px -1px rgba(15, 28, 44, 0.04)"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex flex-col justify-center items-center p-md text-on-surface antialiased">
<!-- Transactional Page, No Navigation Shell -->
<main class="w-full max-w-[480px] flex flex-col items-center">
<!-- Logo -->
<div class="mb-lg">
<span class="text-logo text-brand-navy tracking-tighter">BuyerPocket</span>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest w-full rounded-card shadow-card-resting p-xl flex flex-col gap-lg border border-surface-container">
<!-- Header -->
<div class="flex flex-col gap-xs text-center">
<h1 class="font-h2 text-h2 text-brand-navy">Welcome back.</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your buyer list.</p>
</div>
<!-- Google Sign In Button -->
<button class="w-full flex items-center justify-center gap-sm bg-surface-container-lowest text-brand-navy font-label-bold text-label-bold py-md px-md rounded-input border border-brand-navy hover:bg-surface-container-low transition-colors duration-200">
<svg class="lucide lucide-chrome" fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle><line x1="21.17" x2="12" y1="8" y2="8"></line><line x1="3.95" x2="8.54" y1="6.06" y2="14"></line><line x1="10.88" x2="15.46" y1="21.94" y2="14"></line></svg>
                Continue with Google
            </button>
<!-- Divider -->
<div class="relative flex py-xs items-center">
<div class="flex-grow border-t border-surface-container"></div>
<span class="flex-shrink-0 mx-md font-body-sm text-body-sm text-on-surface-variant bg-surface-container-lowest">or</span>
<div class="flex-grow border-t border-surface-container"></div>
</div>
<!-- Form -->
<form class="flex flex-col gap-md w-full">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface-variant font-medium" for="email">Email</label>
<input class="w-full bg-surface-container-lowest border border-[#E0E1DD] rounded-input py-sm px-md font-body-md text-body-md text-on-surface focus:outline-none focus:border-[2px] focus:border-brand-electric focus:ring-0 transition-all" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface-variant font-medium" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-[#E0E1DD] rounded-input py-sm pl-md pr-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-[2px] focus:border-brand-electric focus:ring-0 transition-all" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center font-body-sm text-body-sm text-on-surface-variant hover:text-brand-navy" type="button">
                            Show
                        </button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end w-full mt-xs">
<a class="font-body-sm text-body-sm text-brand-electric hover:underline transition-all" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full bg-brand-teal text-surface-container-lowest font-label-bold text-label-bold py-md px-md rounded-input hover:opacity-90 transition-opacity duration-200 mt-sm" type="submit">
                    Sign in
                </button>
</form>
<!-- Sign Up Prompt -->
<div class="text-center mt-xs">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? <a class="text-brand-teal font-medium hover:underline" href="#">Start free trial</a>
</p>
</div>
</div>
<!-- Terms Footer -->
<div class="mt-lg text-center w-full px-md">
<p class="text-caption text-on-surface-variant">
                By continuing, you agree to our Terms and Privacy Policy.
            </p>
</div>
</main>
</body></html>

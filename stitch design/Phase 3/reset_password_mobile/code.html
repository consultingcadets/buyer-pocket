<body class="bg-background min-h-screen flex flex-col items-center justify-center font-sans text-on-surface">
<main class="w-full max-w-[375px] px-md py-xxl flex flex-col gap-xl">
<!-- Logo -->
<div class="flex justify-center items-center w-full">
<span class="font-h2 text-h2 text-on-surface tracking-tight">BuyerPocket</span>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-lg p-margin card-shadow flex flex-col gap-lg">
<!-- Header -->
<div class="flex flex-col gap-xs">
<h1 class="font-h3 text-h3 text-on-surface">Reset your password</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Enter a new password for your account.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Input Group: New Password -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface font-medium" for="new_password">New password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#3A86FF] focus:ring-1 focus:ring-[#3A86FF] transition-colors" id="new_password" placeholder="Enter new password" type="password"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant cursor-pointer" data-icon="visibility_off">visibility_off</span>
</div>
</div>
<!-- Input Group: Confirm Password -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface font-medium" for="confirm_password">Confirm new password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#3A86FF] focus:ring-1 focus:ring-[#3A86FF] transition-colors" id="confirm_password" placeholder="Confirm new password" type="password"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant cursor-pointer" data-icon="visibility_off">visibility_off</span>
</div>
</div>
<!-- Action -->
<button class="w-full bg-[#2EC4B6] hover:bg-[#25a095] text-on-primary font-label-bold text-label-bold rounded-lg py-3 mt-xs transition-colors shadow-sm" type="submit">
                    Update password
                </button>
</form>
</div>
</main>
<!-- Footer -->
<footer class="w-full max-w-[375px] mt-auto pb-margin px-margin flex flex-col items-center gap-md bg-transparent">
<div class="flex justify-center gap-margin w-full">
<a class="font-body-sm text-body-sm text-outline hover:text-[#3A86FF] transition-colors cursor-pointer" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-outline hover:text-[#3A86FF] transition-colors cursor-pointer" href="#">Terms of Service</a>
</div>
</footer>

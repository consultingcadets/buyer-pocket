<!-- Header & Identity -->
<div class="flex flex-col items-center gap-md">
<h1 class="font-h2 text-h2 text-primary-container tracking-tight">BuyerPocket</h1>
<!-- Progress Dots -->
<div class="flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<div class="text-center flex flex-col gap-xs mt-sm">
<h2 class="font-h2 text-h2 text-primary">Start your 7-day free trial.</h2>
<p class="font-body text-body text-on-surface-variant">No credit card needed.</p>
</div>
</div>
<!-- Social Login -->
<button class="w-full h-[48px] flex items-center justify-center gap-sm bg-surface-container-lowest border border-primary-container rounded-DEFAULT hover:bg-surface-container transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<div class="flex-1 h-[1px] bg-surface-variant"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">or</span>
<div class="flex-1 h-[1px] bg-surface-variant"></div>
</div>
<!-- Form Fields -->
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Full Name -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Full name</label>
<input class="w-full h-[48px] px-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body text-body text-primary focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" placeholder="Jane Doe" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Email address</label>
<input class="w-full h-[48px] px-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body text-body text-primary focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" placeholder="jane@example.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Password</label>
<input class="w-full h-[48px] px-sm bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body text-body text-primary focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" placeholder="••••••••" type="password"/>
<!-- Strength Indicator -->
<div class="flex gap-base mt-xs">
<div class="h-1 flex-1 bg-outline-variant rounded-full"></div>
<div class="h-1 flex-1 bg-surface-variant rounded-full"></div>
<div class="h-1 flex-1 bg-surface-variant rounded-full"></div>
</div>
</div>
<!-- Mobile Number -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Mobile number (optional)</label>
<div class="flex border border-outline-variant rounded-DEFAULT focus-within:border-secondary focus-within:ring-1 focus-within:ring-secondary transition-colors overflow-hidden">
<div class="h-[48px] px-sm flex items-center justify-center bg-surface-container border-r border-outline-variant">
<span class="font-body text-body text-on-surface-variant">+61</span>
</div>
<input class="w-full h-full px-sm bg-surface-container-lowest border-none focus:ring-0 font-body text-body text-primary" placeholder="400 000 000" type="tel"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[48px] mt-xs bg-secondary text-on-secondary font-button text-button rounded-DEFAULT hover:opacity-90 transition-opacity flex items-center justify-center" type="button">
                Continue
            </button>
</form>
<!-- Footer terms -->
<p class="font-body-sm text-body-sm text-on-surface-variant text-center mt-xs">

            <a class="text-primary-container underline hover:text-secondary transition-colors" href="#">Terms of Service</a>

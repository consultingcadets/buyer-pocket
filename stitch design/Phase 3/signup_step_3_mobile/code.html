<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BuyerPocket - Profile Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#fbf9fa",
                        "surface-container-low": "#f5f3f4",
                        "surface-tint": "#535f72",
                        "secondary": "#006a62",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#303032",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#feddb9",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#3b4859",
                        "on-tertiary-fixed": "#281803",
                        "surface-bright": "#fbf9fa",
                        "outline-variant": "#c5c6cd",
                        "primary-fixed-dim": "#bac7dd",
                        "surface-container": "#f0edef",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#70f8e8",
                        "tertiary-container": "#281803",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e4e2e3",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#44474c",
                        "primary-container": "#0f1c2c",
                        "surface-dim": "#dbd9db",
                        "surface-variant": "#e4e2e3",
                        "tertiary": "#000000",
                        "secondary-container": "#70f8e8",
                        "on-primary-container": "#788599",
                        "on-surface": "#1b1b1d",
                        "on-secondary-fixed-variant": "#005049",
                        "on-secondary-fixed": "#00201d",
                        "surface-container-high": "#eae7e9",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#f2f0f1",
                        "primary": "#000000",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#e0c19f",
                        "on-background": "#1b1b1d",
                        "on-secondary-container": "#007168",
                        "primary-fixed": "#d6e3fa",
                        "on-primary-fixed": "#0f1c2c",
                        "on-tertiary-container": "#9a7f60",
                        "background": "#fbf9fa",
                        "on-tertiary-fixed-variant": "#584328",
                        "outline": "#75777d",
                        "inverse-primary": "#bac7dd",
                        "secondary-fixed-dim": "#4fdbcc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "16px",
                        "xl": "48px",
                        "lg": "32px",
                        "container-max": "1280px",
                        "xs": "8px",
                        "md": "24px",
                        "gutter": "24px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "h3": ["Inter"],
                        "h2": ["Inter"],
                        "button": ["Inter"],
                        "label-caps": ["Inter"],
                        "h1": ["Inter"],
                        "body": ["Inter"],
                        "body-sm": ["Inter"]
                    },
                    "fontSize": {
                        "h3": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "h2": ["32px", { "lineHeight": "1.25", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "button": ["16px", { "lineHeight": "1", "fontWeight": "600" }],
                        "label-caps": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h1": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- TopAppBar Semantic Shell - Modified for Linear Flow -->
<header class="bg-surface-container-lowest font-['Inter'] antialiased text-primary-container full-width top-0 border-b border-surface-variant flat no shadows flex justify-between items-center w-full px-sm py-xs md:px-6 md:py-4 max-w-container-max mx-auto h-[64px]">
<div class="flex items-center gap-xs">
<button aria-label="Go Back" class="text-primary-container hover:text-blue-600 transition-colors duration-200 p-xs">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<div class="text-xl font-bold tracking-tight text-primary-container flex-grow text-center pr-[40px] md:pr-0">
            BuyerPocket
        </div>
<div class="hidden md:flex gap-xs">
<button aria-label="Help" class="text-on-surface-variant hover:text-blue-600 transition-colors duration-200 p-xs">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-sm md:p-lg w-full max-w-md mx-auto relative z-10">
<div class="w-full bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(13,27,42,0.05)] flex flex-col p-md gap-lg">
<!-- Progress Dots -->
<div aria-label="Progress: Step 3 of 3" class="flex justify-center items-center gap-xs w-full">
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
</div>
<!-- Header -->
<div class="flex flex-col gap-xs text-center w-full">
<h2 class="font-h2 text-h2 text-primary-container">Set up your profile</h2>
<p class="font-body text-body text-on-surface-variant">Complete your details to start managing leads.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md w-full">
<!-- Input: Agency Name -->
<div class="flex flex-col gap-base w-full">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="agency-name">Agency Name</label>
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded px-sm font-body text-body text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors" id="agency-name" name="agency-name" placeholder="e.g. Ray White" type="text"/>
</div>
<!-- Input: State Dropdown -->
<div class="flex flex-col gap-base w-full">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="state">State / Territory</label>
<div class="relative w-full">
<select class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded px-sm font-body text-body text-on-surface appearance-none focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors pr-10" id="state" name="state">
<option disabled="" selected="" value="">Select your state</option>
<option value="NSW">New South Wales</option>
<option value="VIC">Victoria</option>
<option value="QLD">Queensland</option>
<option value="WA">Western Australia</option>
<option value="SA">South Australia</option>
<option value="TAS">Tasmania</option>
<option value="ACT">Australian Capital Territory</option>
<option value="NT">Northern Territory</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Input: Timezone Dropdown -->
<div class="flex flex-col gap-base w-full">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="timezone">Timezone</label>
<div class="relative w-full">
<select class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded px-sm font-body text-body text-on-surface appearance-none focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors pr-10" id="timezone" name="timezone">
<option value="AEST">AEST (Sydney, Melbourne, Brisbane)</option>
<option value="ACST">ACST (Adelaide, Darwin)</option>
<option value="AWST">AWST (Perth)</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm w-full mt-sm">
<button class="w-full h-12 bg-secondary text-on-secondary font-button text-button rounded flex items-center justify-center hover:bg-on-secondary-container transition-colors shadow-sm" type="button">
                        Continue
                    </button>
<button class="w-full h-12 bg-transparent text-primary-container font-button text-button rounded flex items-center justify-center hover:bg-surface-variant transition-colors border border-transparent" type="button">
                        Skip for now
                    </button>
</div>
</form>
</div>
</main>
<!-- Navigation Suppressed: Transactional Onboarding Screen -->
</body></html>

<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col items-center justify-center font-body-md text-body-md px-[16px] py-[32px] w-full max-w-[375px] mx-auto">
<!-- Header Section -->
<header class="w-full text-center mb-[48px]">
<h1 class="font-h1 text-h1 text-navy-deep tracking-tighter">BuyerPocket</h1>
</header>
<!-- Main Content Area -->
<main class="w-full flex flex-col gap-[24px]">
<div class="text-center flex flex-col gap-[8px]">
<h2 class="font-h2 text-h2 text-navy-deep">Welcome back.</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your buyer list.</p>
</div>
<!-- Google Login Button -->
<button class="w-full flex items-center justify-center gap-[12px] py-[12px] px-[16px] bg-white border border-outline-variant rounded-card hover:bg-surface-container-low transition-colors duration-200">
<svg class="w-[20px] h-[20px]" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.15v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.15C1.43 8.55 1 10.22 1 12s.43 3.45 1.15 4.93l3.69-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.15 7.07l3.69 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-bold text-label-bold text-navy-deep">Continue with Google</span>
</button>
<!-- Divider -->
<div class="flex items-center w-full my-[8px]">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-[12px] font-body-sm text-body-sm text-on-surface-variant bg-background">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-[16px] w-full">
<div class="flex flex-col gap-[4px]">
<label class="font-body-sm text-body-sm text-navy-deep font-medium" for="email">Email</label>
<input class="w-full px-[12px] py-[12px] bg-white border border-outline-variant rounded-card focus:outline-none focus:border-electric-blue focus:ring-1 focus:ring-electric-blue font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 transition-colors duration-200" id="email" placeholder="agent@agency.com.au" required="" type="email"/>
</div>
<div class="flex flex-col gap-[4px]">
<label class="font-body-sm text-body-sm text-navy-deep font-medium" for="password">Password</label>
<input class="w-full px-[12px] py-[12px] bg-white border border-outline-variant rounded-card focus:outline-none focus:border-electric-blue focus:ring-1 focus:ring-electric-blue font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 transition-colors duration-200" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex justify-end mt-[-8px]">
<a class="font-body-sm text-body-sm text-electric-blue hover:underline" href="#">Forgot password?</a>
</div>
<button class="w-full min-h-[48px] bg-teal-primary text-white font-label-bold text-label-bold rounded-card mt-[8px] hover:bg-teal-primary/90 transition-colors duration-200 flex items-center justify-center" type="submit">
                Sign in
            </button>
</form>
<!-- Sign Up Link -->
<div class="text-center mt-[8px]">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? <a class="text-electric-blue font-medium hover:underline" href="#">Start free trial</a>
</p>
</div>
</main>
<!-- Footer -->
<footer class="mt-auto pt-[48px] w-full text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant opacity-70">
            Secure login for professional agents.
        </p>
</footer>

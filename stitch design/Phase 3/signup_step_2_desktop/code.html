<body class="bg-background text-on-background min-h-screen flex flex-col font-body">
<!-- TopAppBar suppressed for linear/transactional flow -->
<main class="flex-grow flex items-center justify-center p-md">
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-lg shadow-[0px_4px_20px_rgba(13,27,42,0.05)] p-lg flex flex-col gap-lg">
<!-- Progress Dots -->
<div class="flex justify-center gap-xs">
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<div class="text-center">
<h2 class="font-h2 text-h2 text-primary-container mb-xs">Quick question first.</h2>
<p class="font-body text-body text-on-surface-variant">To ensure you can take full advantage of BuyerPocket, we need to know how you operate regarding buyer relationships.</p>
</div>
<div class="flex flex-col gap-sm">
<!-- Option 1: Selected -->
<label class="flex items-start gap-sm p-sm rounded-DEFAULT border border-secondary-container bg-surface-container-low cursor-pointer transition-colors">
<div class="mt-1 flex items-center justify-center">
<input checked="" class="w-4 h-4 text-secondary-container bg-surface-container-lowest border-outline-variant focus:ring-secondary-container focus:ring-2" name="eligibility" type="radio"/>
</div>
<div class="flex flex-col">
<span class="font-button text-button text-primary-container">Independent agent or Principal</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-base">I own my buyer relationships and operate independently.</span>
</div>
</label>
<!-- Option 2 -->
<label class="flex items-start gap-sm p-sm rounded-DEFAULT border border-surface-variant hover:border-outline-variant cursor-pointer transition-colors">
<div class="mt-1 flex items-center justify-center">
<input class="w-4 h-4 text-secondary-container bg-surface-container-lowest border-outline-variant focus:ring-secondary-container focus:ring-2" name="eligibility" type="radio"/>
</div>
<div class="flex flex-col">
<span class="font-button text-button text-primary-container">Agency work with permission</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-base">I work for an agency but have explicit permission to use external tools.</span>
</div>
</label>
<!-- Option 3 -->
<label class="flex items-start gap-sm p-sm rounded-DEFAULT border border-surface-variant hover:border-outline-variant cursor-pointer transition-colors">
<div class="mt-1 flex items-center justify-center">
<input class="w-4 h-4 text-secondary-container bg-surface-container-lowest border-outline-variant focus:ring-secondary-container focus:ring-2" name="eligibility" type="radio"/>
</div>
<div class="flex flex-col">
<span class="font-button text-button text-primary-container">Agency work - not sure</span>
<span class="font-body-sm text-body-sm text-on-surface-variant mt-base">I work for an agency and am unsure about tool policies.</span>
</div>
</label>
<!-- Option 4 -->
<label class="flex items-start gap-sm p-sm rounded-DEFAULT border border-surface-variant hover:border-outline-variant cursor-pointer transition-colors">
<div class="mt-1 flex items-center justify-center">
<input class="w-4 h-4 text-secondary-container bg-surface-container-lowest border-outline-variant focus:ring-secondary-container focus:ring-2" name="eligibility" type="radio"/>
</div>
<div class="flex flex-col">
<span class="font-button text-button text-primary-container">Something else</span>
</div>
</label>
</div>
<div class="flex justify-between items-center mt-sm">
<button class="font-button text-button text-on-surface-variant hover:text-primary-container transition-colors py-2 px-4 rounded-DEFAULT" type="button">
                    Back
                </button>
<button class="bg-secondary text-on-secondary font-button text-button h-[48px] px-lg rounded-DEFAULT hover:bg-[#005a52] transition-colors flex items-center justify-center" type="button">

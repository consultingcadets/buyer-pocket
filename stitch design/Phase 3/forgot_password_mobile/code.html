<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md antialiased">

<main class="w-full max-w-[375px] bg-surface-container-lowest rounded-lg shadow-[0_4px_12px_rgba(15,28,44,0.05)] p-lg flex flex-col gap-xl">
<!-- Header / Branding -->
<div class="text-center">
<h1 class="font-h3 text-h3 text-primary-container mb-xs tracking-tight">BuyerPocket</h1>
</div>
<!-- Title & Copy -->
<div class="text-center flex flex-col gap-sm">
<h2 class="font-h2 text-h2 text-on-background">Forgot your password?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your email address and we'll send you a reset link.</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface" for="email">Email</label>
<input class="w-full h-[48px] px-md py-sm bg-surface-container-lowest border border-surface-dim rounded text-on-background font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-[#3A86FF] focus:border-transparent transition-all duration-200" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
<!-- Submit Action -->
<div class="flex flex-col gap-md items-center">
<button class="w-full h-[48px] bg-[#2EC4B6] hover:bg-[#25a89c] text-on-primary font-label-bold text-label-bold rounded flex items-center justify-center transition-colors duration-200 active:opacity-80" type="submit">
                    Send reset link
                </button>
<a class="font-body-sm text-body-sm text-[#3A86FF] hover:underline transition-all" href="#">Back to login</a>
</div>
</form>
</main>
